<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comercial | Flexbor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Meus Clientes</h2>
        <button class="btn" style="width:auto" onclick="App.toggleModal('cliente', true)">+ Cliente</button>
    </header>

    <div id="lista-clientes">Carregando...</div>

    <div id="mov-cliente" class="modal-ov">
        <div class="modal-content">
            <h3>Novo Cliente</h3>
            <input type="text" id="c-nome" placeholder="Nome da Empresa">
            <input type="text" id="c-nif" placeholder="NIF">
            <button class="btn" onclick="salvarCliente()">Gravar</button>
            <button class="btn btn-sec" onclick="App.toggleModal('cliente', false)">Fechar</button>
        </div>
    </div>

    <script src="app-core.js"></script>
    <script>
        let me = null;
        async function init() {
            me = await App.getUserData();
            const cls = await DB.getClientes('comercial', me?.id);
            document.getElementById('lista-clientes').innerHTML = cls.map(c => `
                <div class="card"><strong>${c.nome}</strong><br><small>NIF: ${c.nif || '---'}</small></div>
            `).join('') || 'Sem clientes.';
        }
        async function salvarCliente() {
            const d = { nome: document.getElementById('c-nome').value, nif: document.getElementById('c-nif').value };
            if(await DB.saveCliente(d, me.id)) { location.reload(); }
        }
        init();
    </script>
</body>
</html>
