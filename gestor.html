<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbor CRM — Gestor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h1>Painel de Gestão</h1>
    <button class="btn btn-sec" style="width:auto" onclick="location.href='index.html'">Sair</button>
  </header>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
    <div class="card" style="text-align:center">
      <small style="color:var(--t2)">VALOR EM PIPELINE</small>
      <div id="total-pipeline" style="font-size:24px; font-weight:800; color:var(--bl)">€ 0,00</div>
    </div>
    <div class="card" style="text-align:center">
      <small style="color:var(--t2)">NEGÓCIOS ATIVOS</small>
      <div id="total-opps" style="font-size:24px; font-weight:800;">0</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:25px;">
    <h3 style="margin-bottom:15px; font-size:14px; color:var(--t2)">FUNIL DE VENDAS (QTD)</h3>
    <div style="height:250px;"><canvas id="chartFases"></canvas></div>
  </div>

  <section>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h2>Todos os Clientes</h2>
      <button class="btn" style="width:auto; padding:8px 15px;" onclick="App.toggleModal('cliente', true)">+ Novo Cliente</button>
    </div>
    <div id="lista-clientes-gestor">Carregando clientes...</div>
  </section>
</div>

<div class="modal-ov" id="mov-contactos">
  <div class="modal-content">
    <h3 id="cont-cliente-nome">Contactos</h3>
    <div id="cont-lista-corpo" style="margin:15px 0; max-height:200px; overflow-y:auto"></div>
    <hr style="border:0; border-top:1px solid var(--s3); margin:15px 0;">
    <h4>Adicionar Contacto</h4>
    <input type="text" id="new-ct-nome" placeholder="Nome">
    <input type="text" id="new-ct-cargo" placeholder="Cargo">
    <button class="btn" onclick="addContactoGes()">Adicionar</button>
    <button class="btn btn-sec" onclick="App.toggleModal('contactos', false)">Fechar</button>
  </div>
</div>

<script src="app-core.js"></script>
<script>
let chartInstance = null;
let currentClienteId = null;

async function initGestor() {
  const user = await App.getUserData();
  if(!user || user.role !== 'gestor') {
    // Se não for gestor, mandamos para o comercial ou index
    location.href = 'comercial.html';
    return;
  }

  const [clientes, opps] = await Promise.all([
    DB.getClientes('gestor'),
    DB.getOportunidades('gestor')
  ]);

  renderStats(opps);
  renderChart(opps);
  renderClientes(clientes);
}

function renderStats(opps) {
  const total = opps.reduce((sum, o) => sum + (Number(o.valor) || 0), 0);
  document.getElementById('total-pipeline').innerText = App.formatEur(total);
  document.getElementById('total-opps').innerText = opps.length;
}

function renderChart(opps) {
  const ctx = document.getElementById('chartFases').getContext('2d');
  const fases = ['Prospeção', 'Qualificação', 'Proposta', 'Negociação', 'Fechado — Ganho'];
  const counts = fases.map(f => opps.filter(o => o.fase === f).length);

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: fases,
      datasets: [{
        label: 'Negócios',
        data: counts,
        backgroundColor: ['#dde0e5', '#d0d3d8', '#4da6ff', '#ffab00', '#36b37e']
      }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
  });
}

function renderClientes(lista) {
  const container = document.getElementById('lista-clientes-gestor');
  container.innerHTML = lista.map(c => `
    <div class="card" style="display:flex; justify-content:space-between; align-items:center">
      <div>
        <strong>${c.nome}</strong><br>
        <small style="color:var(--t2)">NIF: ${c.nif || '---'}</small>
      </div>
      <button class="btn btn-sec" style="width:auto; padding:5px 10px; font-size:12px" 
        onclick="abrirContactosGes('${c.id}', '${c.nome}')">Contactos</button>
    </div>
  `).join('');
}

async function abrirContactosGes(id, nome) {
  currentClienteId = id;
  document.getElementById('cont-cliente-nome').innerText = nome;
  App.toggleModal('contactos', true);
  const cts = await DB.getContactos(id);
  document.getElementById('cont-lista-corpo').innerHTML = cts.map(t => `
    <div style="padding:8px 0; border-bottom:1px solid #eee">
      <strong>${t.nome}</strong> - <small>${t.cargo || 'Geral'}</small>
    </div>
  `).join('') || 'Sem contactos.';
}

async function addContactoGes() {
  const nome = document.getElementById('new-ct-nome').value;
  if(!nome) return;
  await DB.saveContacto({ cliente_id: currentClienteId, nome, cargo: document.getElementById('new-ct-cargo').value });
  abrirContactosGes(currentClienteId, document.getElementById('cont-cliente-nome').innerText);
  document.getElementById('new-ct-nome').value = '';
  document.getElementById('new-ct-cargo').value = '';
}

initGestor();
</script>
</body>
</html>
